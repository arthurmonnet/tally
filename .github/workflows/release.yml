# .github/workflows/release.yml
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver without v prefix (for example: 0.1.2)'
        required: false
        default: ''

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            TAG="v${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [ -z "$TAG" ]; then
            echo "Could not resolve release tag"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Install certificate
        env:
          CERT_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$CERT_BASE64" | base64 --decode -o $CERT_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERT_PATH -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -scheme Tally

      - name: Archive
        run: |
          xcodebuild archive \
            -scheme Tally \
            -archivePath build/Tally.xcarchive \
            -configuration Release \
            CODE_SIGN_STYLE="manual" \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            OTHER_CODE_SIGN_FLAGS="--options runtime"

      - name: Export
        run: |
          cat > build/ExportOptions.plist << EOF_EXPORT
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>developer-id</string>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
              <key>signingStyle</key>
              <string>automatic</string>
          </dict>
          </plist>
          EOF_EXPORT

          xcodebuild -exportArchive \
            -archivePath build/Tally.xcarchive \
            -exportPath build \
            -exportOptionsPlist build/ExportOptions.plist

      - name: Create DMG
        run: |
          STAGING="build/dmg-staging"
          mkdir -p "$STAGING"
          cp -R "build/Tally.app" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create -volname "Tally" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "build/Tally.dmg"
          rm -rf "$STAGING"

      - name: Notarize
        run: |
          xcrun notarytool submit build/Tally.dmg \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --password "${{ secrets.APPLE_APP_PASSWORD }}" \
            --wait

      - name: Staple
        run: xcrun stapler staple build/Tally.dmg

      - name: Download Sparkle tools
        run: |
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/2.9.0/Sparkle-2.9.0.tar.xz" -o /tmp/sparkle.tar.xz
          mkdir -p /tmp/sparkle
          tar -xf /tmp/sparkle.tar.xz -C /tmp/sparkle
          echo "sign_update=/tmp/sparkle/bin/sign_update" >> "$GITHUB_OUTPUT"
        id: sparkle

      - name: Sign update with Sparkle EdDSA
        id: sign
        env:
          SPARKLE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_KEY" ]; then
            echo "::error::SPARKLE_PRIVATE_KEY secret is not set"
            exit 1
          fi

          # Pipe private key via stdin with --ed-key-file -
          OUTPUT=$(echo "$SPARKLE_KEY" | "${{ steps.sparkle.outputs.sign_update }}" build/Tally.dmg --ed-key-file - 2>&1)

          # sign_update outputs: sparkle:edSignature="..." length="..."
          SIGNATURE=$(echo "$OUTPUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')

          if [ -z "$SIGNATURE" ]; then
            echo "::error::Failed to generate EdDSA signature. Output: $OUTPUT"
            exit 1
          fi

          echo "signature=$SIGNATURE" >> "$GITHUB_OUTPUT"

          DMG_LENGTH=$(stat -f%z build/Tally.dmg)
          echo "length=$DMG_LENGTH" >> "$GITHUB_OUTPUT"

      - name: Fetch existing appcast
        run: |
          mkdir -p appcast
          # Fetch existing appcast from gh-pages (if it exists) to preserve history
          curl -sL "https://arthurmonnet.github.io/Tally/appcast.xml" -o appcast/appcast.xml 2>/dev/null || true
          if [ ! -s appcast/appcast.xml ]; then
            rm -f appcast/appcast.xml
          fi

      - name: Generate appcast
        run: |
          python3 scripts/generate_appcast.py \
            --version "${{ steps.version.outputs.tag }}" \
            --dmg-url "https://github.com/arthurmonnet/Tally/releases/download/${{ steps.version.outputs.tag }}/Tally.dmg" \
            --signature "${{ steps.sign.outputs.signature }}" \
            --length "${{ steps.sign.outputs.length }}" \
            --output appcast/appcast.xml

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Tally ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: build/Tally.dmg

      - name: Deploy appcast to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./appcast
          keep_files: true
